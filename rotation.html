<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weekend Rotation – Dec 2025 to Feb 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --border: #d9dee5;
      --text: #101828;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 0;
      color: var(--text);
    }
    header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: center;
    }
    h1 {
      font-size: 1.1rem;
      margin: 0;
    }
    select {
      padding: 0.35rem 0.5rem;
      border-radius: 0.375rem;
      border: 1px solid var(--border);
    }
    main {
      padding: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .week-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .week-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.75rem;
    }
    .week-title {
      font-weight: 600;
      margin-bottom: .5rem;
    }
    .day-block {
      background: #f8fafc;
      border: 1px solid #edf0f4;
      border-radius: 0.5rem;
      padding: 0.5rem;
      margin-bottom: .4rem;
    }
    .day-head {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
    }
    .names {
      margin-top: .4rem;
      display: flex;
      flex-wrap: wrap;
      gap: .3rem;
    }
    .name-pill {
      border-radius: 999px;
      padding: 0.1rem 0.4rem;
      font-size: 0.65rem;
      background: white;
      border: 1px solid #eee;
    }
  </style>
</head>
<body>

<header>
  <h1>Weekend Rotation</h1>
  <select id="employeeFilter">
    <option value="__all">Show everyone</option>
  </select>
</header>

<main>
  <div id="weekContainer" class="week-grid"></div>
</main>

<script>
const weekends = [
  {label:"Week 1",
   saturday:{date:"Dec 6", names:["Bridgette","Missie","Becca","Abby","Kaitlin"]},
   sunday:{date:"Dec 7", names:["Bridgette","Holli","Paige","Julia"]}
  },
  {label:"Week 2",
   saturday:{date:"Dec 13", names:["Bridgette","Missie","Holli","Paige","Kaitlin"]},
   sunday:{date:"Dec 14", names:["Bridgette","Missie","Kathy","Julia"]}
  },
  {label:"Week 3",
   saturday:{date:"Dec 20", names:["Bridgette","Missie","Kathy","Hannah","Becca"]},
   sunday:{date:"Dec 21", names:["Bridgette","Holli","Paige","Kay"]}
  },
  {label:"Week 4",
   saturday:{date:"Dec 27", names:["Bridgette","Missie","Kay","Julia","Kaitlin"]},
   sunday:{date:"Dec 28", names:["Bridgette","Julia","Rebakah","Abby"]}
  },
  {label:"Week 5",
   saturday:{date:"Jan 3", names:["Bridgette","Missie","Julia","Rebakah","Becca"]},
   sunday:{date:"Jan 4", names:["Bridgette","Missie","Nate","Kelsey"]}
  },
  {label:"Week 6",
   saturday:{date:"Jan 10", names:["Bridgette","Missie","Abby","Kay","Kaitlin"]},
   sunday:{date:"Jan 11", names:["Bridgette","Kay","Becca","Hannah"]}
  },
  {label:"Week 7",
   saturday:{date:"Jan 17", names:["Bridgette","Missie","Nate","Kelsey","Paige"]},
   sunday:{date:"Jan 18", names:["Bridgette","Kathy","Hannah","Julia"]}
  },
  {label:"Week 8",
   saturday:{date:"Jan 24", names:["Bridgette","Missie","Becca","Abby","Kaitlin"]},
   sunday:{date:"Jan 25", names:["Bridgette","Missie","Julia","Rebakah"]}
  },
  {label:"Week 9",
   saturday:{date:"Jan 31", names:["Bridgette","Missie","Holli","Kay","Paige"]},
   sunday:{date:"Feb 1", names:["Bridgette","Kay","Becca","Abby"]}
  },
  {label:"Week 10",
   saturday:{date:"Feb 7", names:["Bridgette","Missie","Nate","Kelsey","Hannah"]},
   sunday:{date:"Feb 8", names:["Bridgette","Nate","Kelsey","Rebakah"]}
  },
  {label:"Week 11",
   saturday:{date:"Feb 14", names:["Bridgette","Missie","Rebakah","Abby","Kaitlin"]},
   sunday:{date:"Feb 15", names:["Bridgette","Missie","Holli","Paige"]}
  },
  {label:"Week 12",
   saturday:{date:"Feb 21", names:["Bridgette","Missie","Nate","Kelsey","Kaitlin"]},
   sunday:{date:"Feb 22", names:["Bridgette","Kay","Kathy","Paige"]}
  }
];

const colorMap = {
  Bridgette:"black",
  Missie:"purple",
  Nate:"darkorange",
  Kelsey:"darkorange",
  Becca:"darkgreen",
  Abby:"forestgreen",
  Holli:"royalblue",
  Paige:"slateblue",
  Kathy:"darkred",
  Hannah:"olive",
  Kay:"chocolate",
  Julia:"mediumvioletred",
  Rebakah:"red",
  Kaitlin:"darkcyan"
};

const container = document.getElementById("weekContainer");
const filter = document.getElementById("employeeFilter");

const namesSet = new Set();
weekends.forEach(w=>{
  w.saturday.names.forEach(n=>namesSet.add(n));
  w.sunday.names.forEach(n=>namesSet.add(n));
});

Array.from(namesSet).sort().forEach(n=>{
  const o=document.createElement("option");
  o.value=n;
  o.textContent=n;
  filter.appendChild(o);
});

function render(selected="__all"){
  container.innerHTML="";
  weekends.forEach(w=>{
    const hasSat = selected==="__all" || w.saturday.names.includes(selected);
    const hasSun = selected==="__all" || w.sunday.names.includes(selected);
    if(selected!=="__all" && !hasSat && !hasSun) return;

    const card=document.createElement("div");
    card.className="week-card";
    card.innerHTML=`<div class="week-title">${w.label}</div>`;

    if(hasSat){
      const sat=document.createElement("div");
      sat.className="day-block";
      sat.innerHTML=`<div class="day-head"><span>Saturday</span><span>${w.saturday.date}</span></div>`;
      const wrap=document.createElement("div");
      wrap.className="names";
      w.saturday.names.forEach(n=>{
        if(selected==="__all"||n===selected){
          const p=document.createElement("span");
          p.className="name-pill";
          p.textContent=n;
          p.style.color=colorMap[n];
          wrap.appendChild(p);
        }
      });
      sat.appendChild(wrap);
      card.appendChild(sat);
    }

    if(hasSun){
      const sun=document.createElement("div");
      sun.className="day-block";
      sun.innerHTML=`<div class="day-head"><span>Sunday</span><span>${w.sunday.date}</span></div>`;
      const wrap=document.createElement("div");
      wrap.className="names";
      w.sunday.names.forEach(n=>{
        if(selected==="__all"||n===selected){
          const p=document.createElement("span");
          p.className="name-pill";
          p.textContent=n;
          p.style.color=colorMap[n];
          wrap.appendChild(p);
        }
      });
      sun.appendChild(wrap);
      card.appendChild(sun);
    }

    container.appendChild(card);
  });
}

filter.addEventListener("change", e=>render(e.target.value));
render();
</script>

</body>
</html>
